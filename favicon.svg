<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f9cf9"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="mist" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.2"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)"/>
  <!-- Diffuser body -->
  <rect x="22" y="30" width="20" height="18" rx="4" fill="white" opacity="0.95"/>
  <!-- Diffuser top nozzle -->
  <rect x="28" y="24" width="8" height="8" rx="3" fill="white" opacity="0.9"/>
  <!-- Mist particles -->
  <ellipse cx="28" cy="17" rx="2" ry="4" fill="url(#mist)" opacity="0.7"/>
  <ellipse cx="32" cy="14" rx="2" ry="5" fill="url(#mist)" opacity="0.9"/>
  <ellipse cx="36" cy="17" rx="2" ry="4" fill="url(#mist)" opacity="0.7"/>
  <!-- LED dot on body -->
  <circle cx="32" cy="39" r="2" fill="#4f9cf9"/>
</svg>
